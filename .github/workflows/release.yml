name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build release zip
        run: ./release.sh

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/release/ClaudeMeter.app.zip
          generate_release_notes: true
          body: |
            ## Install

            1. Download `ClaudeMeter.app.zip` below
            2. Unzip and move to `/Applications`
            3. Remove the macOS quarantine flag:
               ```
               xattr -dr com.apple.quarantine /Applications/ClaudeMeter.app
               ```
            4. Open ClaudeMeter
            5. Click **Always Allow** on the macOS keychain prompt
            6. The icon appears in your menu bar
