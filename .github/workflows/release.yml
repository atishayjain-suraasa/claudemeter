name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project ClaudeRing.xcodeproj \
            -scheme ClaudeRing \
            -configuration Release \
            -archivePath build/ClaudeRing.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO

      - name: Export app
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/ClaudeRing.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist .github/export-options.plist

      - name: Ad-hoc sign
        run: |
          codesign --force --sign - \
            --entitlements ClaudeRing/Resources/ClaudeRing.entitlements \
            build/export/ClaudeRing.app

      - name: Zip
        run: |
          cd build/export
          zip -r ../../ClaudeRing.app.zip ClaudeRing.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudeRing.app.zip
          generate_release_notes: true
