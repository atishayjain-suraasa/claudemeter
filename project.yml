name: ClaudeMeter
options:
  bundleIdPrefix: com.atishayjain
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ClaudeMeter:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    info:
      path: ClaudeMeter/Info.plist
      properties:
        CFBundleName: ClaudeMeter
        CFBundleDisplayName: ClaudeMeter
        CFBundleIdentifier: com.atishayjain.claudemeter
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        LSUIElement: true
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: "© 2026 Atishay Jain. MIT License."
    entitlements:
      path: ClaudeMeter/Resources/ClaudeMeter.entitlements
      properties:
        com.apple.security.network.client: true
    sources:
      - path: ClaudeMeter
        excludes:
          - Resources/ClaudeMeter.entitlements
          - Info.plist
    resources:
      - ClaudeMeter/Resources/Assets.xcassets
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: ClaudeMeter/Resources/ClaudeMeter.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.atishayjain.claudemeter
